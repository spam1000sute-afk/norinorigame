<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>通信テスト</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: white; }
        button, input { padding: 10px; font-size: 16px; margin: 5px; }
        #log { background: #000; color: #0f0; padding: 10px; height: 200px; overflow-y: scroll; font-family: monospace; }
        .error { color: #f00; }
    </style>
</head>
<body>
    <h2>WebRTC 通信テスト</h2>
    <button onclick="becomeHost()">親になる</button>
    <hr>
    <input id="host-id" placeholder="親のIDを入力">
    <button onclick="joinHost()">子になる</button>
    
    <h3>動作ログ</h3>
    <div id="log"></div>

    <script>
        const peer = new Peer();
        const logBox = document.getElementById('log');

        // 画面にログを書き出す関数
        function writeLog(msg, isError = false) {
            logBox.innerHTML += `<div class="${isError ? 'error' : ''}">> ${msg}</div>`;
        }

        // 自分のIDが発行された時
        peer.on('open', id => {
            writeLog('あなたのIDが発行されました: ' + id);
        });

        // エラーが起きた時（ここで原因がわかります）
        peer.on('error', err => {
            writeLog('エラー発生: ' + err.type + ' - ' + err.message, true);
        });

        // 親機用の処理
        function becomeHost() {
            writeLog('子機からの接続を待機中...');
            peer.on('connection', conn => {
                writeLog('💡 子機が繋がりました！ (ID: ' + conn.peer + ')');
                conn.on('data', data => writeLog('子機からのメッセージを受信: ' + data));
            });
        }

        // 子機用の処理
        function joinHost() {
            const id = document.getElementById('host-id').value;
            writeLog(id + ' に接続しています...');
            const conn = peer.connect(id);
            
            conn.on('open', () => {
                writeLog('💡 親機に繋がりました！メッセージを送信します。');
                conn.send('こんにちは！テスト成功です！');
            });
        }
    </script>
</body>
</html>
