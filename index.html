<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Custom Card Game Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #2c3e50; color: white; margin: 0; padding: 20px; }
        .container { background: #34495e; padding: 20px; border-radius: 15px; max-width: 800px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        button { padding: 12px 24px; margin: 5px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #7f8c8d !important; cursor: not-allowed; }
        input { padding: 10px; border-radius: 5px; border: none; margin: 5px; }

        .lobby-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin: 15px 0; }
        .host-section { border-bottom: 2px solid #2c3e50; padding-bottom: 20px; margin-bottom: 20px; }

        .status-bar { background: #1abc9c; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 18px; }
        .field-area { padding: 30px; background: #27ae60; border-radius: 50%; width: 200px; height: 200px; margin: 20px auto; display: flex; align-items: center; justify-content: center; border: 5px solid #2ecc71; }
        .card { display: inline-block; width: 70px; height: 100px; background: white; color: black; border-radius: 10px; margin: 5px; line-height: 100px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); vertical-align: middle; }
        .card.playable { border: 4px solid #f1c40f; transform: translateY(-10px); }
        .my-turn { background: #e67e22 !important; }
        
        .controls { margin-top: 20px; padding: 15px; border-top: 1px solid #7f8c8d; }
        .player-list-item { font-size: 14px; color: #bdc3c7; }
        .current-player-highlight { color: #f1c40f; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h2>🎮 P2P カードゲーム設定</h2>
        
        <div class="host-section">
            <h3>👑 ホストとして開始</h3>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
            <div class="lobby-box">
                <p>設定: カードを引く枚数 <input type="number" id="draw-count-input" value="1" min="1" style="width: 50px;"></p>
                <p>接続中のプレイヤー: <span id="player-count">1</span> 名</p>
                <div id="connected-list"></div>
            </div>
            <button onclick="createRoom()" id="btn-create" style="background: #e74c3c;">部屋を作成</button>
            <button onclick="startGame()" id="btn-start" class="hidden" style="background: #27ae60;">ゲームを開始する！</button>
            <p id="host-id-display" style="color: #f1c40f;"></p>
        </div>

        <div class="client-section">
            <h3>👤 プレイヤーとして参加</h3>
            <input type="text" id="join-id" placeholder="ホストIDを入力">
            <button onclick="joinRoom()" style="background: #3498db;">参加する</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="turn-display" class="status-bar">待機中...</div>
        
        <div class="field-area">
            <div>
                <div id="top-card" class="card">空</div>
                <p style="font-size: 12px; margin-top: 5px;">場札</p>
            </div>
        </div>

        <div id="hand-area">
            <p>自分の手札</p>
            <div id="hand-container"></div>
        </div>

        <div class="controls">
            <button id="btn-draw" onclick="actDraw()" style="background: #2980b9;">引く</button>
            <button id="btn-pass" onclick="actPass()" style="background: #95a5a6;">パス</button>
            <p id="game-msg" style="color: #f1c40f; min-height: 20px; font-weight: bold;"></p>
        </div>
        
        <div id="player-order-list" style="margin-top: 20px; font-size: 12px;"></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let myId = "";
    let isHost = false;
    let connToHost = null;
    
    let gameState = {
        status: 'lobby',
        players: [], 
        turnIndex: 0,
        drawCount: 1,
        topCard: null, 
        allHands: {},  
        deck: [],
        rules: {},
        lastPlayerToPlay: null // 【変更点】最後にカードを出した人のIDを記録
    };

    peer.on('open', (id) => { myId = id; });

    async function createRoom() {
        const file = document.getElementById('excel-file').files[0];
        if (!file) return alert("Excelを選択してください");

        const parsed = await parseExcel(file);
        gameState.deck = parsed.deck;
        gameState.rules = parsed.rules;
        gameState.drawCount = parseInt(document.getElementById('draw-count-input').value);
        
        isHost = true;
        gameState.players = [{id: myId, name: "ホスト"}];
        
        document.getElementById('host-id-display').innerText = "部屋ID: " + myId;
        document.getElementById('btn-create').classList.add('hidden');
        document.getElementById('btn-start').classList.remove('hidden');

        peer.on('connection', (conn) => {
            conn.on('open', () => {
                const newPlayer = {id: conn.peer, name: "プレイヤー" + (gameState.players.length + 1)};
                gameState.players.push(newPlayer);
                updateLobbyUI();
                broadcast({ type: 'LOBBY_UPDATE', players: gameState.players });
            });
            conn.on('data', (data) => handleClientAction(conn.peer, data));
        });
        updateLobbyUI();
    }

    function startGame() {
        gameState.status = 'playing';
        gameState.players.forEach(p => {
            gameState.allHands[p.id] = drawFromDeck(5);
        });
        gameState.topCard = null; 
        gameState.turnIndex = 0;
        gameState.lastPlayerToPlay = null; // リセット
        
        broadcast({ type: 'GAME_START', state: gameState });
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        refreshGameUI();
    }

    function joinRoom() {
        const hostId = document.getElementById('join-id').value;
        connToHost = peer.connect(hostId);
        
        connToHost.on('data', (data) => {
            if (data.type === 'LOBBY_UPDATE') {
                document.getElementById('player-count').innerText = data.players.length;
            } else if (data.type === 'GAME_START' || data.type === 'SYNC') {
                gameState = data.state;
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                refreshGameUI();
            } else if (data.type === 'MESSAGE') {
                broadcastMsg(data.msg);
            }
        });
    }

    function handleClientAction(playerId, action) {
        if (!isHost || gameState.status !== 'playing') return;
        if (gameState.players[gameState.turnIndex].id !== playerId) return;

        let success = false;

        if (action.type === 'PLAY') {
            const card = gameState.allHands[playerId][action.index];
            if (!gameState.topCard || (gameState.rules[gameState.topCard] && gameState.rules[gameState.topCard][card] === 1)) {
                gameState.topCard = card;
                gameState.allHands[playerId].splice(action.index, 1);
                gameState.lastPlayerToPlay = playerId; // 【変更点】カードを出した人を記録
                success = true;
            }
        } else if (action.type === 'DRAW') {
            const drawn = drawFromDeck(gameState.drawCount);
            gameState.allHands[playerId].push(...drawn);
            success = true; // 引いてターン終了
        } else if (action.type === 'PASS') {
            success = true; // 出せない（出したくない）時はパスしてターン終了
        }

        if (success) {
            processTurnEnd();
        }
    }

    // 【変更点】ターン終了時と「場を流す」判定のロジック
    function processTurnEnd() {
        // 次のプレイヤーに手番を移す
        gameState.turnIndex = (gameState.turnIndex + 1) % gameState.players.length;
        const nextPlayerId = gameState.players[gameState.turnIndex].id;

        // もし次のプレイヤーが「最後に場札を出した人」なら、1巡したことになる
        if (gameState.topCard !== null && gameState.lastPlayerToPlay === nextPlayerId) {
            gameState.topCard = null; // 場を空にする
            gameState.lastPlayerToPlay = null; // 記録をリセット
            
            // 全員にメッセージを通知
            broadcast({ type: 'MESSAGE', msg: "誰も出せませんでした！場が流れます。" });
            if(isHost) broadcastMsg("誰も出せませんでした！場が流れます。");
        }
        
        broadcast({ type: 'SYNC', state: gameState });
        refreshGameUI();
    }

    function refreshGameUI() {
        const isMyTurn = gameState.players[gameState.turnIndex].id === myId;
        const turnPlayerName = gameState.players[gameState.turnIndex].name;

        document.getElementById('turn-display').innerText = isMyTurn ? "🔥 あなたの番です" : `⌛ ${turnPlayerName}の番`;
        document.getElementById('turn-display').className = isMyTurn ? "status-bar my-turn" : "status-bar";
        document.getElementById('top-card').innerText = gameState.topCard || "空";
        
        const handCont = document.getElementById('hand-container');
        handCont.innerHTML = "";
        const displayHand = isHost ? gameState.allHands[myId] : (gameState.allHands ? gameState.allHands[myId] : []);
        
        displayHand.forEach((card, idx) => {
            const el = document.createElement('div');
            el.className = 'card';
            if (isMyTurn && (!gameState.topCard || (gameState.rules[gameState.topCard] && gameState.rules[gameState.topCard][card] === 1))) {
                el.classList.add('playable');
            }
            el.innerText = card;
            el.onclick = () => { if(isMyTurn) sendAction({type: 'PLAY', index: idx}); };
            handCont.appendChild(el);
        });

        document.getElementById('btn-draw').disabled = !isMyTurn;
        document.getElementById('btn-pass').disabled = !isMyTurn; // いつでもパス可能に
        
        const orderList = document.getElementById('player-order-list');
        orderList.innerHTML = "順番: " + gameState.players.map((p, i) => 
            `<span class="${i === gameState.turnIndex ? 'current-player-highlight' : ''}">${p.name}</span>`
        ).join(" → ");
    }

    function sendAction(action) {
        if (isHost) handleClientAction(myId, action);
        else connToHost.send(action);
    }

    function actDraw() { sendAction({type: 'DRAW'}); }
    function actPass() { sendAction({type: 'PASS'}); }

    function updateLobbyUI() {
        document.getElementById('player-count').innerText = gameState.players.length;
        document.getElementById('connected-list').innerHTML = gameState.players.map(p => `<div class="player-list-item">・${p.name} (ID: ${p.id})</div>`).join("");
    }

    function broadcast(data) {
        if (!isHost) return;
        Object.values(peer.connections).forEach(conns => {
            conns.forEach(c => {
                const personalizedState = JSON.parse(JSON.stringify(gameState));
                c.send({ ...data, state: personalizedState });
            });
        });
    }

    function broadcastMsg(msg) {
        document.getElementById('game-msg').innerText = msg;
        setTimeout(() => document.getElementById('game-msg').innerText = "", 3000);
    }

    function drawFromDeck(num) {
        let cards = [];
        for(let i=0; i<num; i++) {
            if(gameState.deck.length === 0) break;
            cards.push(gameState.deck.pop());
        }
        return cards;
    }

    async function parseExcel(file) {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data);
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        const cardNames = rows[0].slice(2); 
        let deck = [];
        let rules = {};
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row[0]) continue;
            for (let c = 0; c < (row[1] || 0); c++) deck.push(row[0]);
            rules[row[0]] = {};
            for (let j = 0; j < cardNames.length; j++) {
                rules[row[0]][cardNames[j]] = row[j + 2] === 1 ? 1 : 0;
            }
        }
        return { deck: deck.sort(() => Math.random() - 0.5), rules };
    }
</script>
</body>
</html>
